version: '3.8'

services:
  web:
    build: .
    expose:
      - "8000"
    env_file:
      - .env
    volumes:
      - ./gcp-key.json:/app/gcp-key.json
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./cloudflare.crt:/etc/nginx/certs/cloudflare.crt:ro
      - ./cloudflare.key:/etc/nginx/certs/cloudflare.key:ro
    depends_on:
      - web
    restart: always
