server {
    listen 80;
    server_name healthreportview.papagopro.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name healthreportview.papagopro.com;

    ssl_certificate /etc/nginx/certs/cloudflare.crt;
    ssl_certificate_key /etc/nginx/certs/cloudflare.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # 增加上傳檔案大小限制 (RAG 分析健檢報告可能需要上傳較大的 PDF/圖片)
    client_max_body_size 20M;

    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 延長超時時間以支援 RAG 檢索與 Gemini 2.5 分析生成 (預設為 60 秒)
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
}
